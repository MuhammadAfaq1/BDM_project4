x-airflow-common: &airflow-common
  build: .
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://rico:rico@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    POSTGRES_DSN: postgresql://rico:rico@postgres:5432/rico
    MINIO_ENDPOINT: http://minio:9000
    MINIO_ACCESS_KEY: minioadmin
    MINIO_SECRET_KEY: minioadmin
    MINIO_BUCKET: rico-raw
    OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
    OLLAMA_MODEL: qwen2.5:3b
    SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-1}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/rico-pipeline/src
    - ./prompts:/opt/rico-pipeline/prompts
    - ../week07/models:/opt/rico-pipeline/models:ro
    - ../week07/data:/opt/rico-pipeline/data:ro
  user: "50000:0"
  depends_on:
    postgres:
      condition: service_healthy
    minio:
      condition: service_healthy

services:
  postgres:
    image: week07-postgres:16-pgvector
    environment:
      POSTGRES_DB: rico
      POSTGRES_USER: rico
      POSTGRES_PASSWORD: rico
    ports:
      - "5435:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rico -d rico"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/rico-raw &&
      echo 'bucket ready'
      "
    restart: "no"

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create --role Admin --username admin --password admin \
          --firstname Admin --lastname User --email admin@example.com || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8099:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always

volumes:
  postgres-data:
  minio-data:
